<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3tx Pro | مباشر حول العالم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 40px; background: linear-gradient(135deg, #fff, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { color: #ccc; margin-top: 5px; }
        
        .auth-box { background: white; border-radius: 25px; padding: 25px; margin-bottom: 30px; text-align: center; }
        .auth-form { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .auth-form input { padding: 12px 20px; border: 2px solid #ddd; border-radius: 50px; width: 200px; font-family: 'Tajawal', sans-serif; }
        .auth-form button { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .btn-login { background: #764ba2; color: white; }
        .btn-logout { background: #e74c3c; color: white; }
        .user-card { display: inline-flex; align-items: center; gap: 20px; background: #f0f0f0; padding: 10px 25px; border-radius: 50px; }
        
        .add-post { background: white; border-radius: 25px; padding: 25px; margin-bottom: 30px; display: none; border: 2px solid #e67e22; }
        .add-post h3 { color: #e67e22; margin-bottom: 15px; }
        .add-post input, .add-post textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 12px; font-family: 'Tajawal', sans-serif; }
        .add-post button { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        
        .posts-title { color: white; margin-bottom: 15px; font-size: 24px; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .post { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .post h3 { color: #764ba2; margin-bottom: 10px; }
        .post p { color: #555; line-height: 1.6; margin-bottom: 15px; }
        .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; }
        .admin-btns { display: flex; gap: 10px; }
        .edit-btn, .delete-btn { padding: 6px 15px; border: none; border-radius: 50px; cursor: pointer; color: white; }
        .edit-btn { background: #3498db; }
        .delete-btn { background: #e74c3c; }
        .empty { background: white; text-align: center; padding: 60px; border-radius: 20px; color: #888; }
        .loading { text-align: center; color: white; padding: 50px; }
        .real-time-badge { background: #27ae60; color: white; font-size: 12px; padding: 4px 12px; border-radius: 30px; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1><i class="fas fa-crown"></i> متجر 3tx Pro</h1>
        <p>أحدث العروض والمنتجات <span class="real-time-badge"><i class="fas fa-broadcast-tower"></i> مباشر حول العالم</span></p>
    </div>

    <div class="auth-box" id="authBox"></div>

    <div class="add-post" id="addPostBox">
        <h3><i class="fas fa-plus-circle"></i> إضافة منشور جديد</h3>
        <input type="text" id="titleInput" placeholder="العنوان">
        <textarea id="descInput" rows="3" placeholder="محتوى المنشور..."></textarea>
        <button id="publishBtn"><i class="fas fa-paper-plane"></i> نشر المنشور</button>
    </div>

    <div class="posts-title"><i class="fas fa-newspaper"></i> جميع المنشورات</div>
    <div id="postsGrid" class="posts-grid"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري الاتصال بالخادم...</div></div>
</div>

<script>
    // ========== إعدادات Ably ==========
    const ABLY_API_KEY = "0VdV6Q.M-UZTw:4lse8SO8U7yh-FbxOuYdlUwSF3Dsb9woTrZhpUsE6rY";
    const CHANNEL_NAME = "3txpro_posts";
    
    // بيانات المدير
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    const WHATSAPP = "966500000000"; // غير إلى رقمك

    let currentUser = null;
    let allPosts = [];
    let ably = null;
    let channel = null;

    // ========== اتصال Ably ==========
    async function initAbly() {
        try {
            ably = new Ably.Realtime({ key: ABLY_API_KEY });
            channel = ably.channels.get(CHANNEL_NAME);
            
            // استقبال التحديثات من المستخدمين الآخرين
            channel.subscribe("posts_update", (message) => {
                allPosts = message.data;
                displayPosts();
            });
            
            // طلب آخر البيانات
            channel.presence.enter();
            requestLatestPosts();
            
            document.getElementById("postsGrid").innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
        } catch(e) {
            console.error("Ably error:", e);
            document.getElementById("postsGrid").innerHTML = '<div class="empty">خطأ في الاتصال بالخادم</div>';
        }
    }
    
    function requestLatestPosts() {
        channel.publish("request_posts", {});
    }
    
    // نشر التحديثات للجميع
    async function broadcastPosts() {
        if (channel) {
            channel.publish("posts_update", allPosts);
        }
    }
    
    // ========== المنشورات ==========
    function displayPosts() {
        let container = document.getElementById("postsGrid");
        if (!container) return;
        
        if (!allPosts || allPosts.length === 0) {
            container.innerHTML = `<div class="empty"><i class="fas fa-inbox" style="font-size:50px"></i><h3>لا توجد منشورات</h3><p>سجل كمدير (3tx / MM123456) وأضف أول منشور</p></div>`;
            return;
        }
        
        container.innerHTML = "";
        for (let i = 0; i < allPosts.length; i++) {
            let post = allPosts[i];
            let html = `
                <div class="post">
                    <h3>📌 ${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.desc)}</p>
                    <div class="post-footer">
                        <button class="whatsapp-btn" onclick="sendToWhatsapp('${escapeHtml(post.title)}')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button>
            `;
            if (currentUser && currentUser.isAdmin) {
                html += `
                    <div class="admin-btns">
                        <button class="edit-btn" onclick="editPost(${post.id})"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="delete-btn" onclick="deletePost(${post.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                `;
            }
            html += `</div></div>`;
            container.innerHTML += html;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.sendToWhatsapp = function(title) {
        let msg = `مرحباً، أرغب في الاستفسار عن: ${title}`;
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
    };
    
    async function publishNewPost() {
        let title = document.getElementById("titleInput").value;
        let desc = document.getElementById("descInput").value;
        
        if (!title.trim()) {
            alert("❌ الرجاء كتابة العنوان");
            return;
        }
        
        let newPost = {
            id: Date.now(),
            title: title,
            desc: desc
        };
        
        allPosts.unshift(newPost);
        await broadcastPosts();
        
        document.getElementById("titleInput").value = "";
        document.getElementById("descInput").value = "";
        alert("✅ تم نشر المنشور! جميع زبائنك حول العالم يرونه الآن");
    }
    
    window.editPost = async function(id) {
        let post = allPosts.find(p => p.id === id);
        if (!post) return;
        let newTitle = prompt("تعديل العنوان", post.title);
        if (newTitle === null) return;
        let newDesc = prompt("تعديل المحتوى", post.desc);
        if (newDesc === null) return;
        post.title = newTitle;
        post.desc = newDesc;
        await broadcastPosts();
        displayPosts();
    };
    
    window.deletePost = async function(id) {
        if (!confirm("⚠️ هل تريد حذف هذا المنشور؟")) return;
        allPosts = allPosts.filter(p => p.id !== id);
        await broadcastPosts();
        displayPosts();
    };
    
    // ========== تسجيل الدخول ==========
    function login(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) {
            return { success: true, isAdmin: true };
        }
        return { success: false, msg: "❌ اسم المستخدم أو كلمة المرور غير صحيحة" };
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("session");
        updateAuthUI();
        displayPosts();
    }
    
    function updateAuthUI() {
        let authBox = document.getElementById("authBox");
        let addBox = document.getElementById("addPostBox");
        
        if (currentUser && currentUser.isAdmin) {
            authBox.innerHTML = `
                <div class="user-card">
                    <i class="fas fa-user-cog"></i>
                    <strong>المدير ${ADMIN_USER}</strong>
                    <span style="background:#e67e22; color:white; padding:4px 12px; border-radius:30px;">صلاحية كاملة</span>
                    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                </div>
            `;
            addBox.style.display = "block";
        } else {
            authBox.innerHTML = `
                <div class="auth-form">
                    <input type="text" id="loginUser" placeholder="اسم المستخدم">
                    <input type="password" id="loginPass" placeholder="كلمة المرور">
                    <button class="btn-login" onclick="doLogin()">تسجيل دخول</button>
                </div>
            `;
            addBox.style.display = "none";
        }
    }
    
    window.doLogin = function() {
        let username = document.getElementById("loginUser").value;
        let password = document.getElementById("loginPass").value;
        
        if (!username || !password) {
            alert("❌ الرجاء إدخال البيانات");
            return;
        }
        
        let result = login(username, password);
        if (result.success) {
            currentUser = { isAdmin: result.isAdmin };
            localStorage.setItem("session", JSON.stringify(currentUser));
            updateAuthUI();
            displayPosts();
        } else {
            alert(result.msg);
        }
    };
    
    function restoreSession() {
        let saved = localStorage.getItem("session");
        if (saved) {
            currentUser = JSON.parse(saved);
        }
        updateAuthUI();
    }
    
    // ========== بدء التشغيل ==========
    restoreSession();
    initAbly();
    document.getElementById("publishBtn")?.addEventListener("click", publishNewPost);
</script>
</body>
</html>
