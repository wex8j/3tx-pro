<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3TX برو | النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- التصميم العام --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            background-attachment: fixed;
            color: #333;
        }

        /* شاشة تحميل أولية */
        #splash {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: #0f2027; display: flex; justify-content: center;
            align-items: center; z-index: 9999; color: white;
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .login-card {
            background: rgba(255,255,255,0.98);
            border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }

        .login-card input {
            width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #ddd; border-radius: 50px; font-family: 'Tajawal';
        }

        .login-card button {
            width: 100%; padding: 15px; background: #764ba2; color: white;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* لوحة التحكم */
        .dashboard { display: none; padding: 20px; max-width: 1200px; margin: auto; }

        .navbar {
            background: white; border-radius: 20px; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .add-card {
            background: white; border-radius: 20px; padding: 25px;
            margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .add-card input, .add-card textarea {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ddd; border-radius: 10px; font-family: 'Tajawal';
        }

        /* شبكة المنتجات */
        .content-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-item {
            background: white; border-radius: 15px; padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative;
            transition: 0.3s;
        }
        .product-item:hover { transform: translateY(-5px); }

        .product-item img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }

        .views-badge {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7);
            color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px;
        }

        .wa-btn {
            background: #25D366; color: white; display: block; text-align: center;
            padding: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px;
        }

        .delete-btn { color: #e74c3c; cursor: pointer; margin-top: 10px; display: inline-block; font-size: 14px; }
        
        .toggle-form { cursor: pointer; color: #764ba2; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div id="splash"><i class="fas fa-spinner fa-spin fa-3x"></i></div>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2 id="formTitle">متجر 3TX برو</h2>
        <p id="formSub">سجل دخولك للمتابعة</p>
        <input type="text" id="userInput" placeholder="اسم المستخدم">
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button id="loginAction">دخول</button>
        <button id="regAction" style="display:none; background:#27ae60;">إنشاء حساب</button>
        <span class="toggle-form" id="toggleForm">ليس لديك حساب؟ سجل الآن</span>
        <p id="loginError" style="color:red; margin-top:10px;"></p>
    </div>
</div>

<div class="dashboard" id="mainDashboard">
    <div class="navbar">
        <h3><i class="fas fa-store"></i> متجر 3TX برو</h3>
        <div>
            <span id="displayUser" style="margin-left:15px; font-weight:bold;"></span>
            <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">خروج</button>
        </div>
    </div>

    <div class="add-card" id="adminPanel" style="display:none;">
        <h4><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h4>
        <input type="text" id="postTitle" placeholder="عنوان المنتج">
        <textarea id="postDesc" rows="3" placeholder="وصف المنتج..."></textarea>
        <input type="file" id="postImg" accept="image/*">
        <button onclick="addNewPost()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:10px; cursor:pointer;">نشر المنتج</button>
    </div>

    <div id="postContainer" class="content-grid"></div>
</div>

<script>
    // --- الإعدادات ---
    const ADMIN_CREDS = { user: "3tx", pass: "MM123456" };
    const MY_WHATSAPP = "964700000000"; // رقمك هنا

    // مفاتيح التخزين الثابتة لضمان عدم ضياع البيانات
    const DB_POSTS = "3TX_DATA_POSTS_V2";
    const DB_USERS = "3TX_DATA_USERS_V2";
    const DB_SESSION = "3TX_DATA_SESSION_V2";

    let posts = JSON.parse(localStorage.getItem(DB_POSTS)) || [];
    let users = JSON.parse(localStorage.getItem(DB_USERS)) || [];

    // التحقق من الجلسة عند فتح الموقع
    window.onload = () => {
        const session = JSON.parse(localStorage.getItem(DB_SESSION));
        if (session) {
            startApp(session.user, session.role);
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
        }
        document.getElementById('splash').style.fadeOut = "slow";
        setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
    };

    // وظيفة تسجيل الدخول
    document.getElementById('loginAction').onclick = () => {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;

        if (u === ADMIN_CREDS.user && p === ADMIN_CREDS.pass) {
            saveSession(u, 'admin');
        } else {
            const found = users.find(x => x.u === u && x.p === p);
            if (found) saveSession(u, 'customer');
            else document.getElementById('loginError').innerText = "بياناتك غلط يا صاحبي!";
        }
    };

    // وظيفة إنشاء حساب
    document.getElementById('regAction').onclick = () => {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if (u && p) {
            if(users.find(x => x.u === u)) return alert("الاسم محجوز!");
            users.push({u, p});
            localStorage.setItem(DB_USERS, JSON.stringify(users));
            alert("تم! سجل دخولك هسا");
            location.reload();
        }
    };

    function saveSession(user, role) {
        localStorage.setItem(DB_SESSION, JSON.stringify({user, role}));
        startApp(user, role);
    }

    function startApp(user, role) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('displayUser').innerText = user;
        if (role === 'admin') document.getElementById('adminPanel').style.display = 'block';
        renderPosts(role);
    }

    function logout() {
        localStorage.removeItem(DB_SESSION);
        location.reload();
    }

    // --- إدارة المنشورات ---
    function addNewPost() {
        const t = document.getElementById('postTitle').value;
        const d = document.getElementById('postDesc').value;
        const f = document.getElementById('postImg').files[0];

        if (!t || !d) return alert("املأ الفراغات!");

        if (f) {
            const reader = new FileReader();
            reader.onload = (e) => finishPost(t, d, e.target.result);
            reader.readAsDataURL(f);
        } else {
            finishPost(t, d, null);
        }
    }

    function finishPost(t, d, img) {
        const newP = { id: Date.now(), t, d, img, views: Math.floor(Math.random() * 50) };
        posts.unshift(newP); // يظهر الجديد أول واحد
        localStorage.setItem(DB_POSTS, JSON.stringify(posts));
        
        // تصفير الحقول وتحديث فوري
        document.getElementById('postTitle').value = '';
        document.getElementById('postDesc').value = '';
        document.getElementById('postImg').value = '';
        renderPosts('admin');
    }

    function renderPosts(role) {
        const container = document.getElementById('postContainer');
        container.innerHTML = '';

        posts.forEach(p => {
            // زيادة المشاهدة للزبون فقط
            if(role === 'customer') p.views++; 

            const item = document.createElement('div');
            item.className = 'product-item';
            item.innerHTML = `
                <div class="views-badge"><i class="fas fa-eye"></i> ${p.views}</div>
                ${p.img ? `<img src="${p.img}">` : ''}
                <h4 style="margin:10px 0;">${p.t}</h4>
                <p style="font-size:13px; color:#666;">${p.d}</p>
                <a href="https://wa.me/${MY_WHATSAPP}?text=أريد طلب: ${p.t}" class="wa-btn"><i class="fab fa-whatsapp"></i> اطلب هسا</a>
                ${role === 'admin' ? `<span class="delete-btn" onclick="delPost(${p.id})"><i class="fas fa-trash"></i> حذف</span>` : ''}
            `;
            container.appendChild(item);
        });
        if(role === 'customer') localStorage.setItem(DB_POSTS, JSON.stringify(posts));
    }

    window.delPost = (id) => {
        if(confirm("متاكد تحذف؟")) {
            posts = posts.filter(x => x.id !== id);
            localStorage.setItem(DB_POSTS, JSON.stringify(posts));
            renderPosts('admin');
        }
    };

    // تبديل بين دخول وتسجيل
    document.getElementById('toggleForm').onclick = function() {
        const isL = document.getElementById('loginAction').style.display !== 'none';
        document.getElementById('loginAction').style.display = isL ? 'none' : 'block';
        document.getElementById('regAction').style.display = isL ? 'block' : 'none';
        this.innerText = isL ? "عندك حساب؟ سجل دخول" : "ماعندك حساب؟ سجل الآن";
    };
</script>
</body>
</html>
