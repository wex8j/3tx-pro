<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصتي - متجرك الخاص</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
        }

        .main-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .logo h1 {
            color: #764ba2;
            font-size: 28px;
        }

        .logo span {
            color: #667eea;
        }

        /* أزرار تسجيل الدخول والحساب */
        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-login, .btn-signup, .btn-post {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login {
            background: #764ba2;
            color: white;
        }

        .btn-signup {
            background: #27ae60;
            color: white;
        }

        .btn-post {
            background: #e67e22;
            color: white;
        }

        .btn-login:hover, .btn-signup:hover, .btn-post:hover {
            transform: scale(1.03);
        }

        .user-welcome {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f0f0;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .user-welcome i {
            color: #764ba2;
            font-size: 20px;
        }

        /* نموذج تسجيل الدخول */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .modal-content h2 {
            color: #764ba2;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ecf0f1;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
        }

        .modal-content button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 25px;
            cursor: pointer;
            color: #999;
        }

        .switch-auth {
            margin-top: 15px;
            color: #764ba2;
            cursor: pointer;
        }

        /* نموذج إضافة منشور (يظهر للمدير فقط) */
        .post-form {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }

        .post-form h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .post-form input, .post-form textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
        }

        .post-form button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* شبكة المحتوى */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .post-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-card h3 {
            color: #764ba2;
            font-size: 22px;
            margin-bottom: 12px;
        }

        .post-card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .views-count {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-top: 1px solid #ecf0f1;
            border-bottom: 1px solid #ecf0f1;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .edit-btn, .delete-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 25px;
            color: #7f8c8d;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- الهيدر -->
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-store"></i> <span>منصتي</span></h1>
        </div>
        <div id="authArea">
            <!-- سيتم تعبئتها بالجافاسكريبت -->
        </div>
    </div>

    <!-- نموذج إضافة منشور (للمدير فقط) -->
    <div class="post-form" id="postForm">
        <h3><i class="fas fa-plus-circle"></i> أضف منشور جديد</h3>
        <input type="text" id="postTitle" placeholder="العنوان">
        <textarea id="postDesc" rows="4" placeholder="محتوى المنشور..."></textarea>
        <button id="publishBtn"><i class="fas fa-paper-plane"></i> نشر</button>
    </div>

    <!-- شبكة المنشورات -->
    <div id="postsContainer" class="content-grid"></div>
</div>

<!-- نافذة تسجيل الدخول / إنشاء حساب -->
<div class="modal" id="authModal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <i class="fas fa-user-circle" style="font-size: 50px; color: #764ba2;"></i>
        <h2 id="modalTitle">تسجيل الدخول</h2>
        <input type="text" id="authName" placeholder="اسم المستخدم">
        <input type="password" id="authPass" placeholder="كلمة المرور">
        <button id="authActionBtn">دخول</button>
        <div id="authSwitch" class="switch-auth">ليس لديك حساب؟ إنشاء حساب جديد</div>
        <div id="authError" style="color: red; margin-top: 10px;"></div>
    </div>
</div>

<script>
    // ========== بيانات المدير الثابتة ==========
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    
    // رقم الواتساب (غير إلى رقمك)
    const WHATSAPP_NUMBER = "966500000000";
    
    // مفاتيح التخزين
    const POSTS_KEY = "website_posts";
    const USERS_KEY = "website_users";
    const VIEWS_KEY = "post_views";
    const USER_VIEWS_KEY = "user_daily_views";
    
    // المستخدم الحالي
    let currentUser = null;
    
    // المنشورات
    let posts = [];
    
    // ========== دوال المشاهدات الحقيقية ==========
    function loadViews() {
        const stored = localStorage.getItem(VIEWS_KEY);
        return stored ? JSON.parse(stored) : {};
    }
    
    function saveViews(views) {
        localStorage.setItem(VIEWS_KEY, JSON.stringify(views));
    }
    
    function getPostViews(postId) {
        const views = loadViews();
        return views[postId] || 0;
    }
    
    function recordView(postId) {
        const today = new Date().toDateString();
        const userKey = `${USER_VIEWS_KEY}_${today}`;
        let viewedPosts = localStorage.getItem(userKey);
        viewedPosts = viewedPosts ? JSON.parse(viewedPosts) : [];
        
        if (viewedPosts.includes(postId)) {
            return false;
        }
        
        viewedPosts.push(postId);
        localStorage.setItem(userKey, JSON.stringify(viewedPosts));
        
        let views = loadViews();
        views[postId] = (views[postId] || 0) + 1;
        saveViews(views);
        return true;
    }
    
    // تسجيل مشاهدة تلقائية عند عرض الصفحة
    function recordAllViews() {
        posts.forEach(post => {
            recordView(post.id);
        });
        renderPosts();
    }
    
    // ========== دوال المنشورات ==========
    function loadPosts() {
        const stored = localStorage.getItem(POSTS_KEY);
        if (stored) {
            posts = JSON.parse(stored);
        } else {
            posts = [
                { id: 1, title: "🎉 عرض خاص", desc: "خصم 30% على جميع المنتجات لفترة محدودة! اطلب الآن" },
                { id: 2, title: "📱 منتج جديد", desc: "أحدث الأجهزة الذكية وصلت متجرنا" },
                { id: 3, title: "🚚 توصيل مجاني", desc: "توصيل مجاني لكل الطلبات فوق 150 ريال" }
            ];
            savePosts();
        }
        renderPosts();
    }
    
    function savePosts() {
        localStorage.setItem(POSTS_KEY, JSON.stringify(posts));
    }
    
    function addPost(title, desc) {
        if (!title.trim()) {
            alert("الرجاء كتابة العنوان");
            return false;
        }
        const newPost = {
            id: Date.now(),
            title: title.trim(),
            desc: desc.trim()
        };
        posts.unshift(newPost); // يضاف بالأعلى
        savePosts();
        renderPosts();
        return true;
    }
    
    function updatePost(id, newTitle, newDesc) {
        const post = posts.find(p => p.id == id);
        if (post) {
            post.title = newTitle.trim();
            post.desc = newDesc.trim();
            savePosts();
            renderPosts();
        }
    }
    
    function deletePost(id) {
        if (confirm("هل تريد حذف هذا المنشور؟")) {
            posts = posts.filter(p => p.id != id);
            savePosts();
            renderPosts();
        }
    }
    
    // ========== دوال المستخدمين ==========
    function loadUsers() {
        const stored = localStorage.getItem(USERS_KEY);
        if (stored) {
            return JSON.parse(stored);
        }
        return [];
    }
    
    function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }
    
    function registerUser(username, password) {
        const users = loadUsers();
        if (users.find(u => u.username === username)) {
            return { success: false, error: "اسم المستخدم موجود مسبقاً" };
        }
        users.push({ username, password });
        saveUsers(users);
        return { success: true };
    }
    
    function loginUser(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) {
            return { success: true, isAdmin: true, username };
        }
        const users = loadUsers();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            return { success: true, isAdmin: false, username };
        }
        return { success: false, error: "اسم المستخدم أو كلمة المرور غير صحيحة" };
    }
    
    // ========== عرض الواجهة ==========
    function renderPosts() {
        const container = document.getElementById("postsContainer");
        if (!container) return;
        
        if (posts.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-newspaper"></i><h3>لا توجد منشورات</h3><p>أضف أول منشور الآن</p></div>`;
            return;
        }
        
        container.innerHTML = "";
        posts.forEach(post => {
            const views = getPostViews(post.id);
            const card = document.createElement("div");
            card.className = "post-card";
            
            card.innerHTML = `
                <h3>${escapeHtml(post.title)}</h3>
                <p>${escapeHtml(post.desc)}</p>
                <div class="views-count">
                    <i class="fas fa-eye"></i> ${views} مشاهدة
                </div>
                <button class="whatsapp-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}">
                    <i class="fab fa-whatsapp"></i> طلب عبر واتساب
                </button>
            `;
            
            // إذا كان المستخدم الحالي هو المدير، نضيف أزرار التعديل والحذف
            if (currentUser && currentUser.isAdmin) {
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "admin-actions";
                actionsDiv.innerHTML = `
                    <button class="edit-btn" data-id="${post.id}"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="delete-btn" data-id="${post.id}"><i class="fas fa-trash"></i> حذف</button>
                `;
                card.appendChild(actionsDiv);
            }
            
            container.appendChild(card);
        });
        
        // ربط أزرار الواتساب
        document.querySelectorAll(".whatsapp-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const postId = parseInt(btn.getAttribute("data-id"));
                const postTitle = btn.getAttribute("data-title");
                recordView(postId);
                renderPosts();
                const message = `مرحباً، أرغب في الاستفسار عن: ${postTitle}`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
            });
        });
        
        // ربط أزرار التعديل والحذف (للمدير)
        if (currentUser && currentUser.isAdmin) {
            document.querySelectorAll(".edit-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.getAttribute("data-id"));
                    const post = posts.find(p => p.id === id);
                    if (post) {
                        const newTitle = prompt("تعديل العنوان", post.title);
                        if (newTitle !== null) {
                            const newDesc = prompt("تعديل المحتوى", post.desc);
                            if (newDesc !== null) updatePost(id, newTitle, newDesc);
                        }
                    }
                });
            });
            
            document.querySelectorAll(".delete-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.getAttribute("data-id"));
                    deletePost(id);
                });
            });
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    function updateAuthUI() {
        const authArea = document.getElementById("authArea");
        const postForm = document.getElementById("postForm");
        
        if (currentUser) {
            if (currentUser.isAdmin) {
                authArea.innerHTML = `
                    <div class="user-welcome">
                        <i class="fas fa-user-cog"></i>
                        <span>مرحباً المدير ${currentUser.username}</span>
                    </div>
                `;
                postForm.style.display = "block";
            } else {
                authArea.innerHTML = `
                    <div class="user-welcome">
                        <i class="fas fa-user"></i>
                        <span>مرحباً ${currentUser.username}</span>
                    </div>
                `;
                postForm.style.display = "none";
            }
        } else {
            authArea.innerHTML = `
                <div class="auth-buttons">
                    <button class="btn-login" id="showLoginBtn"><i class="fas fa-sign-in-alt"></i> تسجيل دخول</button>
                    <button class="btn-signup" id="showSignupBtn"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
                </div>
            `;
            postForm.style.display = "none";
            
            document.getElementById("showLoginBtn")?.addEventListener("click", () => showAuthModal("login"));
            document.getElementById("showSignupBtn")?.addEventListener("click", () => showAuthModal("signup"));
        }
    }
    
    // ========== نافذة تسجيل الدخول ==========
    let currentAuthMode = "login";
    
    function showAuthModal(mode) {
        currentAuthMode = mode;
        const modal = document.getElementById("authModal");
        const title = document.getElementById("modalTitle");
        const actionBtn = document.getElementById("authActionBtn");
        const switchText = document.getElementById("authSwitch");
        const authName = document.getElementById("authName");
        const authPass = document.getElementById("authPass");
        const authError = document.getElementById("authError");
        
        authError.innerText = "";
        authName.value = "";
        authPass.value = "";
        
        if (mode === "login") {
            title.innerText = "تسجيل الدخول";
            actionBtn.innerText = "دخول";
            switchText.innerText = "ليس لديك حساب؟ إنشاء حساب جديد";
        } else {
            title.innerText = "إنشاء حساب جديد";
            actionBtn.innerText = "إنشاء حساب";
            switchText.innerText = "لديك حساب؟ تسجيل دخول";
        }
        
        modal.style.display = "flex";
    }
    
    function handleAuthAction() {
        const username = document.getElementById("authName").value.trim();
        const password = document.getElementById("authPass").value;
        const authError = document.getElementById("authError");
        
        if (!username || !password) {
            authError.innerText = "الرجاء ملء جميع الحقول";
            return;
        }
        
        if (currentAuthMode === "login") {
            const result = loginUser(username, password);
            if (result.success) {
                currentUser = { username: result.username, isAdmin: result.isAdmin };
                localStorage.setItem("current_user", JSON.stringify(currentUser));
                document.getElementById("authModal").style.display = "none";
                updateAuthUI();
                renderPosts();
            } else {
                authError.innerText = result.error;
            }
        } else {
            const result = registerUser(username, password);
            if (result.success) {
                authError.innerText = "تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن";
                setTimeout(() => {
                    showAuthModal("login");
                }, 1500);
            } else {
                authError.innerText = result.error;
            }
        }
    }
    
    // استعادة الجلسة
    function restoreSession() {
        const stored = localStorage.getItem("current_user");
        if (stored) {
            currentUser = JSON.parse(stored);
            updateAuthUI();
            renderPosts();
        }
    }
    
    // ========== إضافة منشور (للمدير) ==========
    function publishPost() {
        if (!currentUser || !currentUser.isAdmin) {
            alert("يجب تسجيل الدخول كمدير لإضافة منشور");
            return;
        }
        const title = document.getElementById("postTitle").value;
        const desc = document.getElementById("postDesc").value;
        if (addPost(title, desc)) {
            document.getElementById("postTitle").value = "";
            document.getElementById("postDesc").value = "";
            // المنشور يظهر فوراً بدون إعادة تحميل
        }
    }
    
    // ========== أحداث ==========
    document.getElementById("closeModal")?.addEventListener("click", () => {
        document.getElementById("authModal").style.display = "none";
    });
    
    document.getElementById("authActionBtn")?.addEventListener("click", handleAuthAction);
    document.getElementById("authSwitch")?.addEventListener("click", () => {
        if (currentAuthMode === "login") {
            showAuthModal("signup");
        } else {
            showAuthModal("login");
        }
    });
    
    document.getElementById("publishBtn")?.addEventListener("click", publishPost);
    
    // إغلاق المودال بالضغط خارجها
    window.addEventListener("click", (e) => {
        const modal = document.getElementById("authModal");
        if (e.target === modal) {
            modal.style.display = "none";
        }
    });
    
    // بدء التطبيق
    loadPosts();
    restoreSession();
    
    // تسجيل المشاهدات التلقائية بعد تحميل المنشورات
    setTimeout(() => {
        if (posts.length > 0) {
            recordAllViews();
        }
    }, 500);
</script>
</body>
</html>
