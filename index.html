<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3tx Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .logo h1 { color: #764ba2; font-size: 28px; }
        .logo span { color: #667eea; }
        
        /* قسم تسجيل الدخول وإنشاء الحساب */
        .auth-section {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
        }
        .auth-title { color: #764ba2; margin-bottom: 15px; font-size: 20px; }
        .auth-form {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .auth-form input {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            width: 200px;
            font-family: 'Tajawal', sans-serif;
        }
        .auth-form button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-login { background: #764ba2; color: white; }
        .btn-signup { background: #27ae60; color: white; }
        .btn-logout { background: #e74c3c; color: white; }
        .user-card {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: #e9ecef;
            padding: 10px 25px;
            border-radius: 50px;
        }
        .admin-badge {
            background: #e67e22;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        
        /* إضافة منشور (للمدير فقط) */
        .add-post {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
            border: 2px solid #e67e22;
        }
        .add-post h3 { color: #e67e22; margin-bottom: 15px; }
        .add-post input, .add-post textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
        }
        .add-post button {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* المنشورات */
        .posts-title { color: white; margin-bottom: 15px; font-size: 24px; }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .post {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .post h3 { color: #764ba2; margin-bottom: 10px; font-size: 22px; }
        .post p { color: #555; line-height: 1.6; margin-bottom: 15px; }
        .views {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .edit-btn, .delete-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            color: white;
        }
        .edit-btn { background: #3498db; }
        .delete-btn { background: #e74c3c; }
        .empty {
            background: white;
            text-align: center;
            padding: 60px;
            border-radius: 20px;
            color: #888;
        }
        .loading { text-align: center; color: white; padding: 50px; }
        .real-time-badge {
            background: #27ae60;
            color: white;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 30px;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .auth-form input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-crown"></i> متجر <span>3tx Pro</span></h1>
        </div>
    </div>

    <!-- قسم تسجيل الدخول وإنشاء الحساب -->
    <div class="auth-section" id="authSection">
        <div id="authContent"></div>
    </div>

    <!-- إضافة منشور (للمدير فقط) -->
    <div class="add-post" id="addPostBox">
        <h3><i class="fas fa-plus-circle"></i> إضافة منشور جديد</h3>
        <input type="text" id="postTitle" placeholder="العنوان">
        <textarea id="postDesc" rows="3" placeholder="محتوى المنشور..."></textarea>
        <button id="publishBtn"><i class="fas fa-paper-plane"></i> نشر للعالم</button>
    </div>

    <!-- المنشورات -->
    <div class="posts-title"><i class="fas fa-newspaper"></i> جميع المنشورات <span class="real-time-badge"><i class="fas fa-broadcast-tower"></i> مباشر للعالم</span></div>
    <div id="postsGrid" class="posts-grid"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>
</div>

<script>
    // ========== إعدادات ==========
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    const WHATSAPP = "966500000000";
    
    // Ably
    const ABLY_API_KEY = "0VdV6Q.M-UZTw:4lse8SO8U7yh-FbxOuYdlUwSF3Dsb9woTrZhpUsE6rY";
    const CHANNEL_NAME = "3txpro_live";
    
    let currentUser = null;
    let allPosts = [];
    let ably = null;
    let channel = null;
    
    // ========== Ably للبث المباشر ==========
    async function initAbly() {
        try {
            ably = new Ably.Realtime({ key: ABLY_API_KEY });
            channel = ably.channels.get(CHANNEL_NAME);
            
            channel.subscribe("posts_update", (message) => {
                allPosts = message.data;
                savePostsLocal();
                displayPosts();
            });
            
            channel.presence.enter();
            requestLatestPosts();
        } catch(e) {
            console.error(e);
        }
    }
    
    function requestLatestPosts() {
        channel.publish("request_posts", {});
    }
    
    async function broadcastPosts() {
        if (channel) {
            channel.publish("posts_update", allPosts);
        }
        savePostsLocal();
    }
    
    // ========== تخزين محلي ==========
    function loadPostsLocal() {
        let stored = localStorage.getItem("3txpro_posts");
        if (stored) {
            allPosts = JSON.parse(stored);
        } else {
            allPosts = [];
        }
        displayPosts();
    }
    
    function savePostsLocal() {
        localStorage.setItem("3txpro_posts", JSON.stringify(allPosts));
    }
    
    // ========== المشاهدات ==========
    function getViews(postId) {
        let views = localStorage.getItem("3txpro_views");
        let viewsObj = views ? JSON.parse(views) : {};
        return viewsObj[postId] || 0;
    }
    
    function recordView(postId) {
        let today = new Date().toDateString();
        let key = "viewed_" + today;
        let viewed = localStorage.getItem(key);
        viewed = viewed ? JSON.parse(viewed) : [];
        
        if (viewed.includes(postId)) return;
        
        viewed.push(postId);
        localStorage.setItem(key, JSON.stringify(viewed));
        
        let views = localStorage.getItem("3txpro_views");
        let viewsObj = views ? JSON.parse(views) : {};
        viewsObj[postId] = (viewsObj[postId] || 0) + 1;
        localStorage.setItem("3txpro_views", JSON.stringify(viewsObj));
        displayPosts();
    }
    
    // ========== عرض المنشورات ==========
    function displayPosts() {
        let container = document.getElementById("postsGrid");
        if (!container) return;
        
        if (allPosts.length === 0) {
            container.innerHTML = `<div class="empty"><i class="fas fa-inbox" style="font-size:50px"></i><h3>لا توجد منشورات</h3><p>سجل كمدير (3tx / MM123456) وأضف أول منشور</p></div>`;
            return;
        }
        
        container.innerHTML = "";
        for (let i = 0; i < allPosts.length; i++) {
            let post = allPosts[i];
            let views = getViews(post.id);
            let html = `
                <div class="post">
                    <h3>📌 ${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.desc)}</p>
                    <div class="views"><i class="fas fa-eye"></i> ${views} مشاهدة</div>
                    <button class="whatsapp-btn" onclick="sendWhatsapp('${escapeHtml(post.title)}')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button>
            `;
            if (currentUser && currentUser.isAdmin) {
                html += `
                    <div class="admin-actions">
                        <button class="edit-btn" onclick="editPost(${post.id})"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="delete-btn" onclick="deletePost(${post.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML += html;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    window.sendWhatsapp = function(title) {
        let msg = `مرحباً، أرغب في الاستفسار عن: ${title}`;
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
    };
    
    // ========== إدارة المنشورات ==========
    async function addPost() {
        let title = document.getElementById("postTitle").value;
        let desc = document.getElementById("postDesc").value;
        
        if (!title.trim()) {
            alert("الرجاء كتابة العنوان");
            return;
        }
        
        let newPost = { id: Date.now(), title: title, desc: desc };
        allPosts.unshift(newPost);
        await broadcastPosts();
        
        document.getElementById("postTitle").value = "";
        document.getElementById("postDesc").value = "";
        alert("✅ تم نشر المنشور! العالم كله يراه الآن");
    }
    
    window.editPost = async function(id) {
        let post = allPosts.find(p => p.id === id);
        if (!post) return;
        let newTitle = prompt("تعديل العنوان", post.title);
        if (newTitle === null) return;
        let newDesc = prompt("تعديل المحتوى", post.desc);
        if (newDesc === null) return;
        post.title = newTitle;
        post.desc = newDesc;
        await broadcastPosts();
    };
    
    window.deletePost = async function(id) {
        if (!confirm("هل تريد حذف هذا المنشور؟")) return;
        allPosts = allPosts.filter(p => p.id !== id);
        await broadcastPosts();
    };
    
    // ========== المستخدمين (مدير فقط + زبائن) ==========
    let users = [];
    
    function loadUsers() {
        let stored = localStorage.getItem("3txpro_users");
        if (stored) {
            users = JSON.parse(stored);
        } else {
            users = [];
        }
    }
    
    function saveUsers() {
        localStorage.setItem("3txpro_users", JSON.stringify(users));
    }
    
    function register(username, password) {
        if (users.find(u => u.username === username)) {
            return { success: false, msg: "اسم المستخدم موجود" };
        }
        if (username.length < 3) return { success: false, msg: "الاسم 3 أحرف على الأقل" };
        if (password.length < 4) return { success: false, msg: "الرقم السري 4 أحرف على الأقل" };
        
        users.push({ username, password });
        saveUsers();
        return { success: true };
    }
    
    function login(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) {
            return { success: true, isAdmin: true, username: username };
        }
        let user = users.find(u => u.username === username && u.password === password);
        if (user) return { success: true, isAdmin: false, username: username };
        return { success: false, msg: "بيانات غير صحيحة" };
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("session");
        updateAuthUI();
        displayPosts();
    }
    
    // ========== واجهة تسجيل الدخول وإنشاء الحساب ==========
    function updateAuthUI() {
        let authContent = document.getElementById("authContent");
        let addBox = document.getElementById("addPostBox");
        
        if (currentUser) {
            if (currentUser.isAdmin) {
                authContent.innerHTML = `
                    <div class="user-card">
                        <i class="fas fa-user-cog"></i>
                        <strong>المدير ${currentUser.username}</strong>
                        <span class="admin-badge">صلاحية كاملة</span>
                        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                `;
                addBox.style.display = "block";
            } else {
                authContent.innerHTML = `
                    <div class="user-card">
                        <i class="fas fa-user"></i>
                        <strong>مرحباً ${currentUser.username}</strong>
                        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                `;
                addBox.style.display = "none";
            }
        } else {
            authContent.innerHTML = `
                <div class="auth-form">
                    <input type="text" id="authUsername" placeholder="اسم المستخدم">
                    <input type="password" id="authPassword" placeholder="كلمة المرور">
                    <button class="btn-login" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> تسجيل دخول</button>
                    <button class="btn-signup" onclick="doSignup()"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
                </div>
            `;
            addBox.style.display = "none";
        }
    }
    
    window.doLogin = function() {
        let username = document.getElementById("authUsername").value;
        let password = document.getElementById("authPassword").value;
        
        if (!username || !password) {
            alert("الرجاء إدخال البيانات");
            return;
        }
        
        let result = login(username, password);
        if (result.success) {
            currentUser = { username: result.username, isAdmin: result.isAdmin };
            localStorage.setItem("session", JSON.stringify(currentUser));
            updateAuthUI();
            displayPosts();
        } else {
            alert(result.msg);
        }
    };
    
    window.doSignup = function() {
        let username = document.getElementById("authUsername").value;
        let password = document.getElementById("authPassword").value;
        
        if (!username || !password) {
            alert("الرجاء إدخال البيانات");
            return;
        }
        
        let result = register(username, password);
        if (result.success) {
            alert("✅ تم إنشاء الحساب! يمكنك الآن تسجيل الدخول");
            document.getElementById("authUsername").value = "";
            document.getElementById("authPassword").value = "";
        } else {
            alert(result.msg);
        }
    };
    
    function restoreSession() {
        let stored = localStorage.getItem("session");
        if (stored) {
            currentUser = JSON.parse(stored);
        }
        updateAuthUI();
    }
    
    // ========== بدء التشغيل ==========
    loadUsers();
    loadPostsLocal();
    restoreSession();
    initAbly();
    document.getElementById("publishBtn")?.addEventListener("click", addPost);
</script>
</body>
</html>
