<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3tx Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* بطاقة تسجيل الدخول */
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .login-card h3 {
            color: #764ba2;
            margin-bottom: 15px;
        }
        .login-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .login-form input {
            padding: 12px 18px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            width: 200px;
        }
        .login-form button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-login { background: #764ba2; color: white; }
        .btn-signup { background: #27ae60; color: white; }
        .btn-logout { background: #e74c3c; color: white; }
        .user-info {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: #e9ecef;
            padding: 10px 25px;
            border-radius: 50px;
        }
        /* نموذج إضافة منشور (للمدير فقط) */
        .add-post {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }
        .add-post input, .add-post textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
        }
        .add-post button {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        /* المنشورات */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .post {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .post h3 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        .post p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .views {
            color: #888;
            font-size: 13px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .edit { background: #3498db; color: white; border: none; padding: 6px 15px; border-radius: 50px; cursor: pointer; }
        .delete { background: #e74c3c; color: white; border: none; padding: 6px 15px; border-radius: 50px; cursor: pointer; }
        .empty {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            color: #888;
        }
        h2 { color: white; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <!-- عنوان الموقع -->
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: white; font-size: 35px;"><i class="fas fa-crown"></i> متجر 3tx Pro</h1>
        <p style="color: #ccc;">أحدث العروض والمنتجات</p>
    </div>

    <!-- قسم تسجيل الدخول -->
    <div class="login-card" id="loginSection">
        <h3><i class="fas fa-user-circle"></i> حسابك</h3>
        <div id="loginBox"></div>
    </div>

    <!-- قسم إضافة منشور (للمدير فقط) -->
    <div class="add-post" id="addPostSection">
        <h3><i class="fas fa-plus-circle"></i> أضف منشور جديد</h3>
        <input type="text" id="postTitle" placeholder="العنوان">
        <textarea id="postDesc" rows="3" placeholder="محتوى المنشور..."></textarea>
        <button id="publishPostBtn"><i class="fas fa-paper-plane"></i> نشر</button>
    </div>

    <!-- المنشورات -->
    <h2><i class="fas fa-newspaper"></i> المنشورات</h2>
    <div id="postsList" class="posts-grid"></div>
</div>

<script>
    // ========== بيانات المدير ==========
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    const WHATSAPP = "966500000000"; // غير رقمك هنا
    
    // ========== مفاتيح التخزين ==========
    const STORAGE = {
        POSTS: "store_posts",
        USERS: "store_users",
        VIEWS: "store_views",
        SESSION: "store_session"
    };
    
    let currentUser = null;
    let allPosts = [];
    
    // ========== تحميل المنشورات ==========
    function loadPosts() {
        let saved = localStorage.getItem(STORAGE.POSTS);
        if (saved) {
            allPosts = JSON.parse(saved);
        } else {
            allPosts = []; // فارغ تماماً بدون منشورات تجريبية
        }
        showPosts();
    }
    
    function savePosts() {
        localStorage.setItem(STORAGE.POSTS, JSON.stringify(allPosts));
    }
    
    // ========== عرض المنشورات ==========
    function showPosts() {
        let container = document.getElementById("postsList");
        if (!container) return;
        
        if (allPosts.length === 0) {
            container.innerHTML = `<div class="empty"><i class="fas fa-box-open" style="font-size: 50px;"></i><h3>لا توجد منشورات</h3><p>سجل كمدير (3tx / MM123456) وأضف أول منشور</p></div>`;
            return;
        }
        
        container.innerHTML = "";
        for (let i = 0; i < allPosts.length; i++) {
            let post = allPosts[i];
            let views = getViews(post.id);
            
            let html = `
                <div class="post">
                    <h3>📌 ${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.desc)}</p>
                    <div class="views"><i class="fas fa-eye"></i> ${views} مشاهدة</div>
                    <button class="whatsapp" onclick="sendWhatsapp('${escapeHtml(post.title)}')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button>
            `;
            
            // إذا كان المدير مسجل، نضيف أزرار تعديل وحذف
            if (currentUser && currentUser.isAdmin) {
                html += `
                    <div class="admin-btns">
                        <button class="edit" onclick="editPost(${post.id})"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="delete" onclick="deletePost(${post.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                `;
            }
            
            html += `</div>`;
            container.innerHTML += html;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== المشاهدات ==========
    function getViews(postId) {
        let views = localStorage.getItem(STORAGE.VIEWS);
        let viewsObj = views ? JSON.parse(views) : {};
        return viewsObj[postId] || 0;
    }
    
    function addView(postId) {
        let today = new Date().toDateString();
        let key = "viewed_" + today;
        let viewed = localStorage.getItem(key);
        viewed = viewed ? JSON.parse(viewed) : [];
        
        if (viewed.includes(postId)) return;
        
        viewed.push(postId);
        localStorage.setItem(key, JSON.stringify(viewed));
        
        let views = localStorage.getItem(STORAGE.VIEWS);
        let viewsObj = views ? JSON.parse(views) : {};
        viewsObj[postId] = (viewsObj[postId] || 0) + 1;
        localStorage.setItem(STORAGE.VIEWS, JSON.stringify(viewsObj));
        showPosts();
    }
    
    // ========== واتساب ==========
    function sendWhatsapp(title) {
        let msg = `مرحباً، أرغب في الاستفسار عن: ${title}`;
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
    }
    
    // ========== إدارة المنشورات ==========
    function addNewPost() {
        let title = document.getElementById("postTitle").value;
        let desc = document.getElementById("postDesc").value;
        
        if (!title.trim()) {
            alert("الرجاء كتابة العنوان");
            return;
        }
        
        let newPost = {
            id: Date.now(),
            title: title,
            desc: desc
        };
        
        allPosts.unshift(newPost);
        savePosts();
        showPosts();
        
        document.getElementById("postTitle").value = "";
        document.getElementById("postDesc").value = "";
        alert("✅ تم نشر المنشور! الزبائن يرونه الآن");
    }
    
    function editPost(id) {
        let post = allPosts.find(p => p.id === id);
        if (!post) return;
        
        let newTitle = prompt("تعديل العنوان", post.title);
        if (newTitle === null) return;
        let newDesc = prompt("تعديل المحتوى", post.desc);
        if (newDesc === null) return;
        
        post.title = newTitle;
        post.desc = newDesc;
        savePosts();
        showPosts();
    }
    
    function deletePost(id) {
        if (confirm("هل تريد حذف هذا المنشور؟")) {
            allPosts = allPosts.filter(p => p.id !== id);
            savePosts();
            showPosts();
        }
    }
    
    // ========== المستخدمين ==========
    function register(username, password) {
        let users = localStorage.getItem(STORAGE.USERS);
        let usersArr = users ? JSON.parse(users) : [];
        
        if (usersArr.find(u => u.username === username)) {
            return { success: false, msg: "اسم المستخدم موجود" };
        }
        if (username.length < 3) {
            return { success: false, msg: "اسم المستخدم 3 أحرف على الأقل" };
        }
        if (password.length < 4) {
            return { success: false, msg: "كلمة المرور 4 أحرف على الأقل" };
        }
        
        usersArr.push({ username, password });
        localStorage.setItem(STORAGE.USERS, JSON.stringify(usersArr));
        return { success: true };
    }
    
    function login(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) {
            return { success: true, isAdmin: true, username: username };
        }
        
        let users = localStorage.getItem(STORAGE.USERS);
        let usersArr = users ? JSON.parse(users) : [];
        let user = usersArr.find(u => u.username === username && u.password === password);
        
        if (user) {
            return { success: true, isAdmin: false, username: username };
        }
        return { success: false, msg: "اسم المستخدم أو كلمة المرور خطأ" };
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem(STORAGE.SESSION);
        updateLoginUI();
        showPosts();
    }
    
    // ========== واجهة تسجيل الدخول ==========
    function updateLoginUI() {
        let loginBox = document.getElementById("loginBox");
        let addSection = document.getElementById("addPostSection");
        
        if (currentUser) {
            if (currentUser.isAdmin) {
                loginBox.innerHTML = `
                    <div class="user-info">
                        <i class="fas fa-user-cog"></i>
                        <strong>المدير ${currentUser.username}</strong>
                        <span style="background:#e67e22; color:white; padding:4px 12px; border-radius:30px;">مدير</span>
                        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                `;
                addSection.style.display = "block";
            } else {
                loginBox.innerHTML = `
                    <div class="user-info">
                        <i class="fas fa-user"></i>
                        <strong>مرحباً ${currentUser.username}</strong>
                        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                `;
                addSection.style.display = "none";
            }
        } else {
            loginBox.innerHTML = `
                <div class="login-form">
                    <input type="text" id="username" placeholder="اسم المستخدم">
                    <input type="password" id="password" placeholder="كلمة المرور">
                    <button class="btn-login" onclick="doLogin()">تسجيل دخول</button>
                    <button class="btn-signup" onclick="doSignup()">إنشاء حساب</button>
                </div>
            `;
            addSection.style.display = "none";
        }
    }
    
    function doLogin() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        
        if (!username || !password) {
            alert("الرجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }
        
        let result = login(username, password);
        if (result.success) {
            currentUser = { username: result.username, isAdmin: result.isAdmin };
            localStorage.setItem(STORAGE.SESSION, JSON.stringify(currentUser));
            updateLoginUI();
            showPosts();
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        } else {
            alert(result.msg);
        }
    }
    
    function doSignup() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        
        if (!username || !password) {
            alert("الرجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }
        
        let result = register(username, password);
        if (result.success) {
            alert("✅ تم إنشاء الحساب! يمكنك الآن تسجيل الدخول");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        } else {
            alert(result.msg);
        }
    }
    
    function restoreSession() {
        let saved = localStorage.getItem(STORAGE.SESSION);
        if (saved) {
            currentUser = JSON.parse(saved);
        }
        updateLoginUI();
    }
    
    // ========== بدء التشغيل ==========
    loadPosts();
    restoreSession();
    
    window.sendWhatsapp = sendWhatsapp;
    window.editPost = editPost;
    window.deletePost = deletePost;
    window.doLogin = doLogin;
    window.doSignup = doSignup;
    window.logout = logout;
    
    document.getElementById("publishPostBtn")?.addEventListener("click", addNewPost);
</script>
</body>
</html>
