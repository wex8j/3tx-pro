<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3tx Pro | إدارة المحتوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
        }

        .main-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* الهيدر الرئيسي */
        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 14px;
            color: #666;
            display: block;
        }

        /* واجهة تسجيل الدخول المدمجة */
        .login-bar {
            background: #f8f9fa;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .login-bar input {
            padding: 10px 18px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            width: 160px;
        }

        .login-bar button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login {
            background: #764ba2;
            color: white;
        }

        .btn-signup {
            background: #27ae60;
            color: white;
        }

        .user-welcome {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-welcome i {
            color: #764ba2;
            font-size: 18px;
        }

        .admin-badge {
            background: #e67e22;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        /* نموذج إضافة منشور (للمدير فقط) */
        .post-form {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }

        .post-form h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .post-form input, .post-form textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
        }

        .post-form button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* شبكة المنشورات */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .post-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-card h3 {
            color: #764ba2;
            font-size: 22px;
            margin-bottom: 12px;
        }

        .post-card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .views-count {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-top: 1px solid #ecf0f1;
            border-bottom: 1px solid #ecf0f1;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .edit-btn, .delete-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 25px;
            color: #7f8c8d;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .login-bar input {
                width: 130px;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- الهيدر مع واجهة تسجيل الدخول المدمجة -->
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-crown"></i> متجر 3tx Pro</h1>
            <span>أحدث العروض والمنتجات</span>
        </div>
        <div id="loginArea">
            <!-- سيتم تعبئتها بالجافاسكريبت -->
        </div>
    </div>

    <!-- نموذج إضافة منشور (للمدير فقط) -->
    <div class="post-form" id="postForm">
        <h3><i class="fas fa-plus-circle"></i> أضف منشور جديد</h3>
        <input type="text" id="postTitle" placeholder="العنوان">
        <textarea id="postDesc" rows="4" placeholder="محتوى المنشور..."></textarea>
        <button id="publishBtn"><i class="fas fa-paper-plane"></i> نشر المنشور</button>
    </div>

    <!-- شبكة المنشورات -->
    <div id="postsContainer" class="content-grid"></div>
</div>

<script>
    // ========== بيانات المدير الثابتة ==========
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    
    // رقم الواتساب (غير إلى رقمك)
    const WHATSAPP_NUMBER = "966500000000";
    
    // مفاتيح التخزين
    const POSTS_KEY = "3txpro_posts";
    const USERS_KEY = "3txpro_users";
    const VIEWS_KEY = "3txpro_views";
    const USER_VIEWS_KEY = "3txpro_user_daily_views";
    const SESSION_KEY = "3txpro_current_user";
    
    // المستخدم الحالي
    let currentUser = null;
    
    // المنشورات
    let posts = [];
    
    // ========== دوال المشاهدات الحقيقية ==========
    function loadViews() {
        const stored = localStorage.getItem(VIEWS_KEY);
        return stored ? JSON.parse(stored) : {};
    }
    
    function saveViews(views) {
        localStorage.setItem(VIEWS_KEY, JSON.stringify(views));
    }
    
    function getPostViews(postId) {
        const views = loadViews();
        return views[postId] || 0;
    }
    
    function recordView(postId) {
        const today = new Date().toDateString();
        const userKey = `${USER_VIEWS_KEY}_${today}`;
        let viewedPosts = localStorage.getItem(userKey);
        viewedPosts = viewedPosts ? JSON.parse(viewedPosts) : [];
        
        if (viewedPosts.includes(postId)) {
            return false;
        }
        
        viewedPosts.push(postId);
        localStorage.setItem(userKey, JSON.stringify(viewedPosts));
        
        let views = loadViews();
        views[postId] = (views[postId] || 0) + 1;
        saveViews(views);
        return true;
    }
    
    // تسجيل مشاهدة تلقائية لجميع المنشورات
    function recordAllViews() {
        posts.forEach(post => {
            recordView(post.id);
        });
        renderPosts();
    }
    
    // ========== دوال المنشورات ==========
    function loadPosts() {
        const stored = localStorage.getItem(POSTS_KEY);
        if (stored) {
            posts = JSON.parse(stored);
        } else {
            posts = [
                { id: 1, title: "🎉 عرض خاص", desc: "خصم 30% على جميع المنتجات لفترة محدودة! اطلب الآن" },
                { id: 2, title: "📱 منتج جديد", desc: "أحدث الأجهزة الذكية وصلت متجرنا" },
                { id: 3, title: "🚚 توصيل مجاني", desc: "توصيل مجاني لكل الطلبات فوق 150 ريال" }
            ];
            savePosts();
        }
        renderPosts();
    }
    
    function savePosts() {
        localStorage.setItem(POSTS_KEY, JSON.stringify(posts));
    }
    
    function addPost(title, desc) {
        if (!title.trim()) {
            alert("الرجاء كتابة العنوان");
            return false;
        }
        const newPost = {
            id: Date.now(),
            title: title.trim(),
            desc: desc.trim()
        };
        posts.unshift(newPost);
        savePosts();
        renderPosts();
        return true;
    }
    
    function updatePost(id, newTitle, newDesc) {
        const post = posts.find(p => p.id == id);
        if (post) {
            post.title = newTitle.trim();
            post.desc = newDesc.trim();
            savePosts();
            renderPosts();
        }
    }
    
    function deletePost(id) {
        if (confirm("هل تريد حذف هذا المنشور؟")) {
            posts = posts.filter(p => p.id != id);
            savePosts();
            renderPosts();
        }
    }
    
    // ========== دوال المستخدمين ==========
    function loadUsers() {
        const stored = localStorage.getItem(USERS_KEY);
        if (stored) {
            return JSON.parse(stored);
        }
        return [];
    }
    
    function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }
    
    function registerUser(username, password) {
        const users = loadUsers();
        if (users.find(u => u.username === username)) {
            return { success: false, error: "اسم المستخدم موجود مسبقاً" };
        }
        if (username.length < 3) {
            return { success: false, error: "اسم المستخدم يجب أن يكون 3 أحرف على الأقل" };
        }
        if (password.length < 4) {
            return { success: false, error: "كلمة المرور يجب أن تكون 4 أحرف على الأقل" };
        }
        users.push({ username, password });
        saveUsers(users);
        return { success: true };
    }
    
    function loginUser(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) {
            return { success: true, isAdmin: true, username };
        }
        const users = loadUsers();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            return { success: true, isAdmin: false, username };
        }
        return { success: false, error: "اسم المستخدم أو كلمة المرور غير صحيحة" };
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem(SESSION_KEY);
        updateLoginUI();
        renderPosts();
    }
    
    // ========== عرض الواجهة ==========
    function renderPosts() {
        const container = document.getElementById("postsContainer");
        if (!container) return;
        
        if (posts.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-newspaper"></i><h3>لا توجد منشورات</h3><p>أضف أول منشور الآن</p></div>`;
            return;
        }
        
        container.innerHTML = "";
        posts.forEach(post => {
            const views = getPostViews(post.id);
            const card = document.createElement("div");
            card.className = "post-card";
            
            card.innerHTML = `
                <h3>${escapeHtml(post.title)}</h3>
                <p>${escapeHtml(post.desc)}</p>
                <div class="views-count">
                    <i class="fas fa-eye"></i> ${views} مشاهدة
                </div>
                <button class="whatsapp-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}">
                    <i class="fab fa-whatsapp"></i> طلب عبر واتساب
                </button>
            `;
            
            if (currentUser && currentUser.isAdmin) {
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "admin-actions";
                actionsDiv.innerHTML = `
                    <button class="edit-btn" data-id="${post.id}"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="delete-btn" data-id="${post.id}"><i class="fas fa-trash"></i> حذف</button>
                `;
                card.appendChild(actionsDiv);
            }
            
            container.appendChild(card);
        });
        
        document.querySelectorAll(".whatsapp-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const postId = parseInt(btn.getAttribute("data-id"));
                const postTitle = btn.getAttribute("data-title");
                recordView(postId);
                renderPosts();
                const message = `مرحباً، أرغب في الاستفسار عن: ${postTitle}`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
            });
        });
        
        if (currentUser && currentUser.isAdmin) {
            document.querySelectorAll(".edit-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.getAttribute("data-id"));
                    const post = posts.find(p => p.id === id);
                    if (post) {
                        const newTitle = prompt("تعديل العنوان", post.title);
                        if (newTitle !== null) {
                            const newDesc = prompt("تعديل المحتوى", post.desc);
                            if (newDesc !== null) updatePost(id, newTitle, newDesc);
                        }
                    }
                });
            });
            
            document.querySelectorAll(".delete-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.getAttribute("data-id"));
                    deletePost(id);
                });
            });
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    // ========== تحديث واجهة تسجيل الدخول ==========
    function updateLoginUI() {
        const loginArea = document.getElementById("loginArea");
        const postForm = document.getElementById("postForm");
        
        if (currentUser) {
            if (currentUser.isAdmin) {
                loginArea.innerHTML = `
                    <div class="user-welcome">
                        <i class="fas fa-user-cog"></i>
                        <span>المدير ${currentUser.username}</span>
                        <span class="admin-badge">صلاحية كاملة</span>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                `;
                postForm.style.display = "block";
            } else {
                loginArea.innerHTML = `
                    <div class="user-welcome">
                        <i class="fas fa-user"></i>
                        <span>مرحباً ${currentUser.username}</span>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                `;
                postForm.style.display = "none";
            }
            document.getElementById("logoutBtn")?.addEventListener("click", logout);
        } else {
            loginArea.innerHTML = `
                <div class="login-bar">
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم">
                    <input type="password" id="loginPassword" placeholder="كلمة المرور">
                    <button class="btn-login" id="doLoginBtn">دخول</button>
                    <button class="btn-signup" id="doSignupBtn">إنشاء حساب</button>
                </div>
            `;
            postForm.style.display = "none";
            
            document.getElementById("doLoginBtn")?.addEventListener("click", () => handleLogin());
            document.getElementById("doSignupBtn")?.addEventListener("click", () => handleSignup());
            document.getElementById("loginUsername")?.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleLogin();
            });
            document.getElementById("loginPassword")?.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleLogin();
            });
        }
    }
    
    function handleLogin() {
        const username = document.getElementById("loginUsername")?.value.trim();
        const password = document.getElementById("loginPassword")?.value;
        
        if (!username || !password) {
            alert("الرجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }
        
        const result = loginUser(username, password);
        if (result.success) {
            currentUser = { username: result.username, isAdmin: result.isAdmin };
            localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
            updateLoginUI();
            renderPosts();
            if (document.getElementById("loginUsername")) {
                document.getElementById("loginUsername").value = "";
                document.getElementById("loginPassword").value = "";
            }
        } else {
            alert(result.error);
        }
    }
    
    function handleSignup() {
        const username = document.getElementById("loginUsername")?.value.trim();
        const password = document.getElementById("loginPassword")?.value;
        
        if (!username || !password) {
            alert("الرجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }
        
        const result = registerUser(username, password);
        if (result.success) {
            alert("تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول");
            if (document.getElementById("loginUsername")) {
                document.getElementById("loginUsername").value = "";
                document.getElementById("loginPassword").value = "";
            }
        } else {
            alert(result.error);
        }
    }
    
    // استعادة الجلسة
    function restoreSession() {
        const stored = localStorage.getItem(SESSION_KEY);
        if (stored) {
            currentUser = JSON.parse(stored);
            updateLoginUI();
            renderPosts();
        } else {
            updateLoginUI();
            renderPosts();
        }
    }
    
    // ========== إضافة منشور (للمدير) ==========
    function publishPost() {
        if (!currentUser || !currentUser.isAdmin) {
            alert("يجب تسجيل الدخول كمدير لإضافة منشور");
            return;
        }
        const title = document.getElementById("postTitle").value;
        const desc = document.getElementById("postDesc").value;
        if (addPost(title, desc)) {
            document.getElementById("postTitle").value = "";
            document.getElementById("postDesc").value = "";
        }
    }
    
    // ========== بدء التطبيق ==========
    document.getElementById("publishBtn")?.addEventListener("click", publishPost);
    
    loadPosts();
    restoreSession();
    
    setTimeout(() => {
        if (posts.length > 0) {
            recordAllViews();
        }
    }, 500);
</script>
</body>
</html>
