<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3tx Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .login-card h2 { color: #764ba2; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 15px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-card .btn-signup { background: #27ae60; }
        .error-msg { color: red; margin-top: 10px; font-size: 14px; }
        .success-msg { color: green; margin-top: 10px; font-size: 14px; }

        .admin-panel { display: none; }
        .navbar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo h1 { color: #764ba2; font-size: 28px; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-badge {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 50px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
        }
        .add-post {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .add-post h3 { color: #e67e22; margin-bottom: 15px; }
        .add-post input, .add-post textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
        }
        .add-post button {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .image-preview {
            margin: 10px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .image-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        .remove-img {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
        }

        .posts-title { color: white; margin-bottom: 15px; font-size: 24px; }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .post {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .post h3 { color: #764ba2; margin-bottom: 10px; }
        .post p { color: #555; line-height: 1.6; margin-bottom: 15px; }
        .post-images {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .post-images img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        .views {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .edit-btn, .delete-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
        }
        .edit-btn { background: #3498db; }
        .delete-btn { background: #e74c3c; }
        .empty {
            background: white;
            text-align: center;
            padding: 60px;
            border-radius: 20px;
            color: #888;
        }
        @media (max-width: 768px) {
            .posts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول وإنشاء الحساب -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 50px; color: #764ba2;"></i>
        <h2>متجر 3tx Pro</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn">تسجيل دخول</button>
        <button id="signupBtn" class="btn-signup">إنشاء حساب جديد</button>
        <div id="loginError" class="error-msg"></div>
        <div id="signupSuccess" class="success-msg"></div>
    </div>
</div>

<!-- لوحة المدير (تظهر فقط للمدير) -->
<div class="admin-panel" id="adminPanel">
    <div class="navbar">
        <div class="logo"><h1><i class="fas fa-store"></i> متجر 3tx Pro</h1></div>
        <div class="user-info">
            <span class="user-badge" id="userNameDisplay"><i class="fas fa-user"></i> مرحباً</span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>
    </div>

    <!-- قسم إضافة منشور (يظهر فقط للمدير) -->
    <div class="add-post" id="addPostSection">
        <h3><i class="fas fa-plus-circle"></i> إضافة منشور جديد</h3>
        <input type="text" id="postTitle" placeholder="العنوان">
        <textarea id="postDesc" rows="3" placeholder="محتوى المنشور..."></textarea>
        <input type="file" id="postImages" multiple accept="image/*">
        <div class="image-preview" id="imagePreview"></div>
        <button id="publishBtn"><i class="fas fa-paper-plane"></i> نشر للعالم</button>
    </div>

    <div class="posts-title"><i class="fas fa-newspaper"></i> جميع المنشورات</div>
    <div id="postsGrid" class="posts-grid"><div class="empty">لا توجد منشورات</div></div>
</div>

<script>
    // ========== إعدادات ==========
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    const WHATSAPP = "966500000000";
    const ABLY_KEY = "0VdV6Q.M-UZTw:4lse8SO8U7yh-FbxOuYdlUwSF3Dsb9woTrZhpUsE6rY";
    
    // مفاتيح التخزين
    const USERS_KEY = "3txpro_users";
    const POSTS_KEY = "3txpro_posts";
    const VIEWS_KEY = "3txpro_views";
    const SESSION_KEY = "3txpro_session";
    
    let currentUser = null;
    let allPosts = [];
    let ably = null;
    let channel = null;
    let selectedImages = [];
    
    // ========== Ably للبث المباشر ==========
    async function initAbly() {
        try {
            ably = new Ably.Realtime({ key: ABLY_KEY });
            channel = ably.channels.get("3txpro_store");
            channel.subscribe("posts_update", (msg) => {
                allPosts = msg.data;
                savePostsLocal();
                displayPosts();
            });
            channel.presence.enter();
            channel.publish("get_posts", {});
        } catch(e) { console.error(e); }
    }
    
    async function broadcastPosts() {
        if (channel) channel.publish("posts_update", allPosts);
        savePostsLocal();
    }
    
    // ========== المنشورات ==========
    function loadPostsLocal() {
        let stored = localStorage.getItem(POSTS_KEY);
        allPosts = stored ? JSON.parse(stored) : [];
        displayPosts();
    }
    
    function savePostsLocal() {
        localStorage.setItem(POSTS_KEY, JSON.stringify(allPosts));
    }
    
    // المشاهدات
    function getViews(postId) {
        let v = localStorage.getItem(VIEWS_KEY);
        let views = v ? JSON.parse(v) : {};
        return views[postId] || 0;
    }
    
    function addView(postId) {
        let today = new Date().toDateString();
        let key = "viewed_" + today;
        let viewed = localStorage.getItem(key);
        viewed = viewed ? JSON.parse(viewed) : [];
        if (viewed.includes(postId)) return;
        viewed.push(postId);
        localStorage.setItem(key, JSON.stringify(viewed));
        let v = localStorage.getItem(VIEWS_KEY);
        let views = v ? JSON.parse(v) : {};
        views[postId] = (views[postId] || 0) + 1;
        localStorage.setItem(VIEWS_KEY, JSON.stringify(views));
        displayPosts();
    }
    
    // تحويل الصور
    function imagesToBase64(files) {
        return new Promise((resolve) => {
            let promises = [];
            for (let i = 0; i < files.length; i++) {
                let promise = new Promise((res) => {
                    let reader = new FileReader();
                    reader.onload = (e) => res(e.target.result);
                    reader.readAsDataURL(files[i]);
                });
                promises.push(promise);
            }
            Promise.all(promises).then(resolve);
        });
    }
    
    // عرض المنشورات
    function displayPosts() {
        let container = document.getElementById("postsGrid");
        if (!container) return;
        if (allPosts.length === 0) {
            container.innerHTML = `<div class="empty">لا توجد منشورات</div>`;
            return;
        }
        container.innerHTML = "";
        for (let i = 0; i < allPosts.length; i++) {
            let post = allPosts[i];
            let views = getViews(post.id);
            let imagesHtml = "";
            if (post.images && post.images.length) {
                imagesHtml = `<div class="post-images">`;
                for (let img of post.images) {
                    imagesHtml += `<img src="${img}" alt="صورة">`;
                }
                imagesHtml += `</div>`;
            }
            let html = `
                <div class="post">
                    <h3>📌 ${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.desc)}</p>
                    ${imagesHtml}
                    <div class="views"><i class="fas fa-eye"></i> ${views} مشاهدة</div>
                    <button class="whatsapp-btn" onclick="sendWhatsapp('${escapeHtml(post.title)}')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button>
            `;
            if (currentUser && currentUser.isAdmin) {
                html += `
                    <div class="admin-actions">
                        <button class="edit-btn" onclick="editPost(${post.id})"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="delete-btn" onclick="deletePost(${post.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML += html;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    window.sendWhatsapp = (title) => {
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`مرحباً، أرغب في الاستفسار عن: ${title}`)}`, "_blank");
    };
    
    // إضافة منشور (للمدير فقط)
    async function publishPost() {
        if (!currentUser || !currentUser.isAdmin) {
            alert("يجب تسجيل الدخول كمدير");
            return;
        }
        let title = document.getElementById("postTitle").value;
        let desc = document.getElementById("postDesc").value;
        if (!title.trim()) { alert("الرجاء كتابة العنوان"); return; }
        
        let newPost = { id: Date.now(), title: title, desc: desc, images: selectedImages };
        allPosts.unshift(newPost);
        await broadcastPosts();
        
        document.getElementById("postTitle").value = "";
        document.getElementById("postDesc").value = "";
        document.getElementById("postImages").value = "";
        selectedImages = [];
        document.getElementById("imagePreview").innerHTML = "";
        alert("✅ تم نشر المنشور!");
    }
    
    window.editPost = async (id) => {
        let post = allPosts.find(p => p.id === id);
        if (!post) return;
        let newTitle = prompt("العنوان الجديد", post.title);
        if (newTitle === null) return;
        let newDesc = prompt("المحتوى الجديد", post.desc);
        if (newDesc === null) return;
        post.title = newTitle;
        post.desc = newDesc;
        await broadcastPosts();
    };
    
    window.deletePost = async (id) => {
        if (!confirm("حذف المنشور؟")) return;
        allPosts = allPosts.filter(p => p.id !== id);
        await broadcastPosts();
    };
    
    // معاينة الصور
    document.getElementById("postImages")?.addEventListener("change", async (e) => {
        let files = Array.from(e.target.files);
        let base64s = await imagesToBase64(files);
        selectedImages = base64s;
        let preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        base64s.forEach((img, idx) => {
            let div = document.createElement("div");
            div.style.position = "relative";
            div.innerHTML = `<img src="${img}"><button class="remove-img" data-idx="${idx}">✖</button>`;
            preview.appendChild(div);
        });
        document.querySelectorAll(".remove-img").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let idx = parseInt(btn.getAttribute("data-idx"));
                selectedImages.splice(idx, 1);
                document.getElementById("postImages").value = "";
                let newPreview = document.getElementById("imagePreview");
                newPreview.innerHTML = "";
                selectedImages.forEach((img, i) => {
                    let div = document.createElement("div");
                    div.innerHTML = `<img src="${img}"><button class="remove-img" data-idx="${i}">✖</button>`;
                    newPreview.appendChild(div);
                });
            });
        });
    });
    
    // ========== المستخدمين (مدير + زبائن) ==========
    function loadUsers() {
        let stored = localStorage.getItem(USERS_KEY);
        return stored ? JSON.parse(stored) : [];
    }
    
    function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }
    
    function registerUser(username, password) {
        let users = loadUsers();
        if (users.find(u => u.username === username)) {
            return { success: false, error: "اسم المستخدم موجود" };
        }
        if (username.length < 3) return { success: false, error: "الاسم 3 أحرف على الأقل" };
        if (password.length < 4) return { success: false, error: "الرقم السري 4 أحرف على الأقل" };
        users.push({ username, password });
        saveUsers(users);
        return { success: true };
    }
    
    function loginUser(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) {
            return { success: true, isAdmin: true, username: username };
        }
        let users = loadUsers();
        let user = users.find(u => u.username === username && u.password === password);
        if (user) return { success: true, isAdmin: false, username: username };
        return { success: false, error: "بيانات غير صحيحة" };
    }
    
    // ========== واجهة تسجيل الدخول ==========
    function showAdminPanel() {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("userNameDisplay").innerHTML = `<i class="fas fa-user-cog"></i> ${currentUser.username} ${currentUser.isAdmin ? '(مدير)' : ''}`;
        
        // إظهار/إخفاء قسم إضافة المنشورات
        let addSection = document.getElementById("addPostSection");
        if (currentUser.isAdmin) {
            addSection.style.display = "block";
        } else {
            addSection.style.display = "none";
        }
        
        loadPostsLocal();
    }
    
    function showLoginScreen() {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminPanel").style.display = "none";
        document.getElementById("loginError").innerHTML = "";
        document.getElementById("signupSuccess").innerHTML = "";
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
    }
    
    function handleLogin() {
        let username = document.getElementById("loginUser").value;
        let password = document.getElementById("loginPass").value;
        let result = loginUser(username, password);
        if (result.success) {
            currentUser = { username: result.username, isAdmin: result.isAdmin };
            localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
            showAdminPanel();
        } else {
            document.getElementById("loginError").innerHTML = result.error;
            document.getElementById("signupSuccess").innerHTML = "";
        }
    }
    
    function handleSignup() {
        let username = document.getElementById("loginUser").value;
        let password = document.getElementById("loginPass").value;
        if (!username || !password) {
            document.getElementById("loginError").innerHTML = "الرجاء إدخال البيانات";
            return;
        }
        let result = registerUser(username, password);
        if (result.success) {
            document.getElementById("signupSuccess").innerHTML = "✅ تم إنشاء الحساب! يمكنك تسجيل الدخول";
            document.getElementById("loginError").innerHTML = "";
            document.getElementById("loginUser").value = "";
            document.getElementById("loginPass").value = "";
        } else {
            document.getElementById("loginError").innerHTML = result.error;
            document.getElementById("signupSuccess").innerHTML = "";
        }
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem(SESSION_KEY);
        showLoginScreen();
    }
    
    function restoreSession() {
        let stored = localStorage.getItem(SESSION_KEY);
        if (stored) {
            currentUser = JSON.parse(stored);
            showAdminPanel();
        } else {
            showLoginScreen();
        }
    }
    
    // ========== بدء التشغيل ==========
    document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
    document.getElementById("signupBtn")?.addEventListener("click", handleSignup);
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    document.getElementById("publishBtn")?.addEventListener("click", publishPost);
    
    document.getElementById("loginUser")?.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
    });
    document.getElementById("loginPass")?.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
    });
    
    restoreSession();
    initAbly();
</script>
</body>
</html>
