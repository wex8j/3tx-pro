<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر 3tx Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .login-card h2 { color: #764ba2; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-card .btn-signup { background: #27ae60; }
        .error-msg { color: red; margin-top: 10px; font-size: 14px; }
        .success-msg { color: green; margin-top: 10px; font-size: 14px; }

        /* واجهة المدير */
        .admin-panel { display: none; }
        .navbar {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo h1 { color: #764ba2; font-size: 24px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-badge { background: #e9ecef; padding: 8px 20px; border-radius: 50px; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 50px; cursor: pointer; }
        
        /* إضافة منشور */
        .add-post {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .add-post h3 { color: #e67e22; margin-bottom: 15px; }
        .add-post input, .add-post textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
        }
        .add-post button {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .remove-img { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        
        /* المنشورات */
        .posts-title { color: white; margin-bottom: 15px; font-size: 22px; }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .post {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .post h3 { color: #764ba2; margin-bottom: 10px; }
        .post p { color: #555; line-height: 1.6; margin-bottom: 15px; }
        .post-images { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .post-images img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; }
        .views { padding: 8px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; color: #7f8c8d; font-size: 14px; margin-bottom: 12px; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 10px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; }
        .admin-actions { display: flex; gap: 10px; margin-top: 12px; justify-content: flex-end; }
        .edit-btn, .delete-btn { padding: 6px 15px; border: none; border-radius: 50px; cursor: pointer; color: white; }
        .edit-btn { background: #3498db; }
        .delete-btn { background: #e74c3c; }
        .empty { background: white; text-align: center; padding: 60px; border-radius: 20px; color: #888; }
        @media (max-width: 768px) { .posts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 50px; color: #764ba2;"></i>
        <h2>متجر 3tx Pro</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn">تسجيل دخول</button>
        <button id="signupBtn" class="btn-signup">إنشاء حساب جديد</button>
        <div id="loginError" class="error-msg"></div>
        <div id="signupSuccess" class="success-msg"></div>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="navbar">
        <div class="logo"><h1><i class="fas fa-store"></i> متجر 3tx Pro</h1></div>
        <div class="user-info">
            <span class="user-badge" id="userNameDisplay"></span>
            <button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
        </div>
    </div>

    <div class="add-post" id="addPostSection">
        <h3><i class="fas fa-plus-circle"></i> إضافة منشور جديد</h3>
        <input type="text" id="postTitle" placeholder="العنوان">
        <textarea id="postDesc" rows="3" placeholder="محتوى المنشور..."></textarea>
        <input type="file" id="postImages" multiple accept="image/*">
        <div class="image-preview" id="imagePreview"></div>
        <button id="publishBtn">نشر للعالم</button>
    </div>

    <div class="posts-title"><i class="fas fa-newspaper"></i> جميع المنشورات</div>
    <div id="postsGrid" class="posts-grid"><div class="empty">لا توجد منشورات</div></div>
</div>

<script>
    const ADMIN_USER = "3tx";
    const ADMIN_PASS = "MM123456";
    const WHATSAPP = "966500000000";
    const ABLY_KEY = "0VdV6Q.uzGPBw:cToENFYYe0T7-CxEwje3Zu2FaEsZ4WyfHLZI5r4ESeo";
    
    let currentUser = null;
    let allPosts = [];
    let ably = null;
    let channel = null;
    let selectedImages = [];
    
    // Ably
    async function initAbly() {
        try {
            ably = new Ably.Realtime({ key: ABLY_KEY });
            channel = ably.channels.get("store_posts");
            channel.subscribe("update", (msg) => {
                allPosts = msg.data;
                localStorage.setItem("posts", JSON.stringify(allPosts));
                displayPosts();
            });
            channel.presence.enter();
            channel.publish("get", {});
        } catch(e) { console.log(e); }
        loadLocalPosts();
    }
    
    async function broadcast() {
        if (channel) channel.publish("update", allPosts);
        localStorage.setItem("posts", JSON.stringify(allPosts));
    }
    
    function loadLocalPosts() {
        let stored = localStorage.getItem("posts");
        allPosts = stored ? JSON.parse(stored) : [];
        displayPosts();
    }
    
    // المشاهدات
    function getViews(id) {
        let v = localStorage.getItem("views");
        let views = v ? JSON.parse(v) : {};
        return views[id] || 0;
    }
    
    function addView(id) {
        let today = new Date().toDateString();
        let key = "viewed_" + today;
        let viewed = localStorage.getItem(key);
        viewed = viewed ? JSON.parse(viewed) : [];
        if (viewed.includes(id)) return;
        viewed.push(id);
        localStorage.setItem(key, JSON.stringify(viewed));
        let v = localStorage.getItem("views");
        let views = v ? JSON.parse(v) : {};
        views[id] = (views[id] || 0) + 1;
        localStorage.setItem("views", JSON.stringify(views));
        displayPosts();
    }
    
    // الصور
    function imagesToBase64(files) {
        return new Promise((resolve) => {
            let promises = [];
            for (let f of files) {
                promises.push(new Promise((res) => {
                    let reader = new FileReader();
                    reader.onload = (e) => res(e.target.result);
                    reader.readAsDataURL(f);
                }));
            }
            Promise.all(promises).then(resolve);
        });
    }
    
    // عرض المنشورات
    function displayPosts() {
        let container = document.getElementById("postsGrid");
        if (!container) return;
        if (allPosts.length === 0) {
            container.innerHTML = '<div class="empty">لا توجد منشورات</div>';
            return;
        }
        container.innerHTML = "";
        for (let post of allPosts) {
            let imagesHtml = "";
            if (post.images && post.images.length) {
                imagesHtml = '<div class="post-images">';
                for (let img of post.images) imagesHtml += `<img src="${img}">`;
                imagesHtml += '</div>';
            }
            let html = `
                <div class="post">
                    <h3>📌 ${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.desc)}</p>
                    ${imagesHtml}
                    <div class="views"><i class="fas fa-eye"></i> ${getViews(post.id)} مشاهدة</div>
                    <button class="whatsapp-btn" onclick="sendWhatsapp('${escapeHtml(post.title)}')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button>
            `;
            if (currentUser && currentUser.isAdmin) {
                html += `
                    <div class="admin-actions">
                        <button class="edit-btn" onclick="editPost(${post.id})">تعديل</button>
                        <button class="delete-btn" onclick="deletePost(${post.id})">حذف</button>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML += html;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    window.sendWhatsapp = (title) => {
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`مرحباً، أرغب في الاستفسار عن: ${title}`)}`, "_blank");
    };
    
    // إضافة منشور
    async function publishPost() {
        if (!currentUser || !currentUser.isAdmin) { alert("للمدير فقط"); return; }
        let title = document.getElementById("postTitle").value;
        let desc = document.getElementById("postDesc").value;
        if (!title.trim()) { alert("الرجاء كتابة العنوان"); return; }
        let newPost = { id: Date.now(), title, desc, images: selectedImages };
        allPosts.unshift(newPost);
        await broadcast();
        document.getElementById("postTitle").value = "";
        document.getElementById("postDesc").value = "";
        document.getElementById("postImages").value = "";
        selectedImages = [];
        document.getElementById("imagePreview").innerHTML = "";
        alert("تم النشر!");
    }
    
    window.editPost = async (id) => {
        let post = allPosts.find(p => p.id === id);
        if (!post) return;
        let newTitle = prompt("العنوان الجديد", post.title);
        if (newTitle === null) return;
        let newDesc = prompt("المحتوى الجديد", post.desc);
        if (newDesc === null) return;
        post.title = newTitle;
        post.desc = newDesc;
        await broadcast();
    };
    
    window.deletePost = async (id) => {
        if (!confirm("حذف؟")) return;
        allPosts = allPosts.filter(p => p.id !== id);
        await broadcast();
    };
    
    // معاينة الصور
    document.getElementById("postImages")?.addEventListener("change", async (e) => {
        let files = Array.from(e.target.files);
        selectedImages = await imagesToBase64(files);
        let preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        selectedImages.forEach((img, i) => {
            let div = document.createElement("div");
            div.innerHTML = `<img src="${img}"><button class="remove-img" data-idx="${i}">✖</button>`;
            preview.appendChild(div);
        });
        document.querySelectorAll(".remove-img").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let idx = parseInt(btn.getAttribute("data-idx"));
                selectedImages.splice(idx, 1);
                document.getElementById("postImages").value = "";
                let newPreview = document.getElementById("imagePreview");
                newPreview.innerHTML = "";
                selectedImages.forEach((img, i) => {
                    let div = document.createElement("div");
                    div.innerHTML = `<img src="${img}"><button class="remove-img" data-idx="${i}">✖</button>`;
                    newPreview.appendChild(div);
                });
            });
        });
    });
    
    // المستخدمين
    function loadUsers() {
        let u = localStorage.getItem("users");
        return u ? JSON.parse(u) : [];
    }
    function saveUsers(users) { localStorage.setItem("users", JSON.stringify(users)); }
    
    function register(username, password) {
        let users = loadUsers();
        if (users.find(u => u.username === username)) return { success: false, error: "الاسم موجود" };
        if (username.length < 3) return { success: false, error: "الاسم 3 أحرف" };
        if (password.length < 4) return { success: false, error: "الرقم السري 4 أحرف" };
        users.push({ username, password });
        saveUsers(users);
        return { success: true };
    }
    
    function login(username, password) {
        if (username === ADMIN_USER && password === ADMIN_PASS) return { success: true, isAdmin: true, username };
        let users = loadUsers();
        let user = users.find(u => u.username === username && u.password === password);
        if (user) return { success: true, isAdmin: false, username };
        return { success: false, error: "بيانات غير صحيحة" };
    }
    
    // واجهة
    function showAdminPanel() {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("userNameDisplay").innerHTML = `<i class="fas fa-user-cog"></i> ${currentUser.username} ${currentUser.isAdmin ? '(مدير)' : ''}`;
        document.getElementById("addPostSection").style.display = currentUser.isAdmin ? "block" : "none";
        loadLocalPosts();
    }
    
    function showLogin() {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminPanel").style.display = "none";
    }
    
    function handleLogin() {
        let username = document.getElementById("loginUser").value;
        let password = document.getElementById("loginPass").value;
        let result = login(username, password);
        if (result.success) {
            currentUser = { username: result.username, isAdmin: result.isAdmin };
            localStorage.setItem("session", JSON.stringify(currentUser));
            showAdminPanel();
        } else {
            document.getElementById("loginError").innerHTML = result.error;
        }
    }
    
    function handleSignup() {
        let username = document.getElementById("loginUser").value;
        let password = document.getElementById("loginPass").value;
        if (!username || !password) { document.getElementById("loginError").innerHTML = "املأ الحقول"; return; }
        let result = register(username, password);
        if (result.success) {
            document.getElementById("signupSuccess").innerHTML = "✅ تم إنشاء الحساب!";
            document.getElementById("loginError").innerHTML = "";
            document.getElementById("loginUser").value = "";
            document.getElementById("loginPass").value = "";
        } else {
            document.getElementById("loginError").innerHTML = result.error;
        }
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("session");
        showLogin();
    }
    
    function restoreSession() {
        let sess = localStorage.getItem("session");
        if (sess) {
            currentUser = JSON.parse(sess);
            showAdminPanel();
        } else {
            showLogin();
        }
    }
    
    // بدء التشغيل
    document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
    document.getElementById("signupBtn")?.addEventListener("click", handleSignup);
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    document.getElementById("publishBtn")?.addEventListener("click", publishPost);
    
    restoreSession();
    initAbly();
</script>
</body>
</html>
